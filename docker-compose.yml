version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: ledger-db
    env_file:
      - .env.development
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ledger}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ledger-api
    env_file:
      - .env.development
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-ledger}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      PORT: ${PORT:-8080}
      HMAC_SECRET: ${HMAC_SECRET:-test-secret-key-should-be-long-and-secure}
      TOLERANCE_MINUTES: ${TOLERANCE_MINUTES:-5}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata:
